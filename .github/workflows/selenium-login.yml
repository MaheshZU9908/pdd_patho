name: PathoAI CI/CD - E2E Testing & Deployment

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:


permissions:
  contents: write

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y google-chrome-stable wget
        # Install matching ChromeDriver
        CHROME_VERSION=$(google-chrome --version | grep -oP "\d+\.\d+\.\d+")
        DRIVER_VERSION=$(wget -qO- https://chromedriver.storage.googleapis.com/LATEST_RELEASE_$CHROME_VERSION)
        wget -q https://chromedriver.storage.googleapis.com/${DRIVER_VERSION}/chromedriver_linux64.zip
        unzip -o chromedriver_linux64.zip -d $HOME/.local/bin
        chmod +x $HOME/.local/bin/chromedriver
        echo "ChromeDriver $DRIVER_VERSION installed"

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r app/requirements.txt

    - name: Start FastAPI Server
      run: |
        cd app
        # Start uvicorn in background; ensure it stays alive for subsequent steps
        nohup python -m uvicorn backend.app:app --host 127.0.0.1 --port 8000 > uvicorn.log 2>&1 &
        echo "FastAPI Server started in background (nohup)."

    - name: Wait for server to start
      run: |
        timeout 60s bash -c 'until curl --silent --fail http://127.0.0.1:8000/health; do echo "Waiting for server..."; sleep 2; done'
        echo "FastAPI Server is healthy and running!"

    - name: Run Selenium E2E Tests
      env:
        PYTHONPATH: ${{ github.workspace }}/automation_tests:${{ github.workspace }}/app
      run: |
        pytest automation_tests/test_web.py -v

    - name: Deploy to GitHub Pages
      if: github.ref == 'refs/heads/main' && success()
      uses: peaceiris/actions-gh-pages@v4
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./app/frontend
        publish_branch: gh-pages
