name: PathoAI CI/CD - E2E Testing & Deployment

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y google-chrome-stable

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r app/requirements.txt

    - name: Start FastAPI Server
      run: |
        cd app
        python -m uvicorn backend.app:app --host 127.0.0.1 --port 8000 &
        echo "FastAPI Server started in background."

    - name: Wait for server to start
      run: |
        timeout 60s bash -c 'until curl --silent --fail http://127.0.0.1:8000/health; do echo "Waiting for server..."; sleep 2; done'
        echo "FastAPI Server is healthy and running!"

    - name: Run Selenium E2E Tests
      env:
        PYTHONPATH: ${{ github.workspace }}/automation_tests:${{ github.workspace }}/app
      run: |
        pytest automation_tests/test_web.py -v

    - name: Deploy to GitHub Pages
      if: github.ref == 'refs/heads/main' && success()
      uses: peaceiris/actions-gh-pages@v4
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./app/frontend
        publish_branch: gh-pages
